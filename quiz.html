<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Exam Preparation Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .quiz-container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.1em;
            color: #667eea;
        }
        
        .question-block {
            margin-bottom: 40px;
            padding-bottom: 40px;
            border-bottom: 2px solid #e5e7eb;
        }
        
        .question-block:last-of-type {
            border-bottom: none;
        }
        
        .question-number {
            font-size: 0.9em;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        
        .question-text {
            font-size: 1.15em;
            color: #1f2937;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .situation {
            background: #f3f4f6;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-size: 0.95em;
            color: #374151;
            line-height: 1.6;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .option {
            position: relative;
        }
        
        .option input {
            display: none;
        }
        
        .option label {
            display: block;
            padding: 14px 16px;
            background: #f9fafb;
            border: 2px solid #d1d5db;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95em;
            color: #374151;
        }
        
        .option label:hover {
            background: #f0f0f0;
            border-color: #999;
        }
        
        .option input:checked + label {
            background: #dbeafe;
            border-color: #667eea;
            font-weight: 600;
            color: #1e40af;
        }
        
        .option input:disabled + label {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .feedback {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            display: none;
            font-size: 0.95em;
            line-height: 1.6;
        }
        
        .feedback.show {
            display: block;
        }
        
        .feedback.correct {
            background: #dcfce7;
            border-left: 4px solid #22c55e;
            color: #166534;
        }
        
        .feedback.incorrect {
            background: #fee2e2;
            border-left: 4px solid #ef4444;
            color: #991b1b;
        }
        
        .feedback-title {
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 1.05em;
        }
        
        .feedback-text {
            margin-bottom: 12px;
        }
        
        .theory-reference {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 16px;
            border-radius: 4px;
            margin-top: 16px;
            font-size: 0.95em;
        }
        
        .theory-title {
            font-weight: 600;
            color: #78350f;
            margin-bottom: 12px;
            font-size: 1em;
        }
        
        .theory-content {
            color: #78350f;
            line-height: 1.6;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .theory-content h3 {
            font-size: 0.95em;
            font-weight: 600;
            margin: 12px 0 8px 0;
            color: #78350f;
        }
        
        .theory-content h4 {
            font-size: 0.9em;
            font-weight: 600;
            margin: 10px 0 6px 0;
            color: #78350f;
        }
        
        .theory-content ul, .theory-content ol {
            margin-left: 16px;
            margin-bottom: 8px;
        }
        
        .theory-content li {
            margin-bottom: 4px;
        }
        
        .theory-content p {
            margin-bottom: 8px;
        }
        
        .theory-content code {
            background: #fcd34d;
            padding: 2px 4px;
            border-radius: 2px;
            font-family: monospace;
            font-size: 0.9em;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: flex-end;
        }
        
        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        
        .btn-submit {
            background: #667eea;
            color: white;
            min-width: 120px;
        }
        
        .btn-submit:hover:not(:disabled) {
            background: #5568d3;
        }
        
        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-reset {
            background: #e5e7eb;
            color: #374151;
        }
        
        .btn-reset:hover {
            background: #d1d5db;
        }
        
        .score-section {
            background: #f0f9ff;
            border: 2px solid #0ea5e9;
            border-radius: 8px;
            padding: 20px;
            margin-top: 40px;
            text-align: center;
            display: none;
        }
        
        .score-section.show {
            display: block;
        }
        
        .score-title {
            font-size: 1.3em;
            color: #0c4a6e;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .score-value {
            font-size: 2.5em;
            color: #667eea;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .score-message {
            color: #0c4a6e;
            font-size: 1em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Claude Exam Preparation Quiz</h1>
            <p>Test your knowledge across all domains</p>
        </div>
        
        <div id="quizContainer" class="quiz-container">
            <div class="loading">Loading questions...</div>
        </div>
    </div>
    
    <script>
        // Question bank will be populated from fetched markdown files
        let questionBank = [];
        let currentQuizQuestions = [];
        let currentAnswers = {};
        let theoryContent = {};

        // Parse markdown question format
        function parseMarkdownQuestions(markdown) {
            const questions = [];
            
            // Split by "## Question" to identify question blocks
            const questionBlocks = markdown.split(/## Question \d+/).slice(1);
            
            questionBlocks.forEach((block, blockIndex) => {
                try {
                    // Extract title (first line after ## Question N)
                    const titleMatch = block.match(/\*\*Title:\*\*\s*(.+?)(?:\n|$)/);
                    const title = titleMatch ? titleMatch[1].trim() : `Question ${blockIndex + 1}`;
                    
                    // Extract situation
                    const situationMatch = block.match(/\*\*Situation:\*\*\s*(.+?)(?=\*\*Options:\*\*)/s);
                    const situation = situationMatch ? situationMatch[1].trim().replace(/\[...\]/g, '').slice(0, 500) : '';
                    
                    // Extract options
                    const optionsMatch = block.match(/\*\*Options:\*\*\s*([\s\S]+?)(?=\*\*Correct Answer:\*\*)/);
                    if (!optionsMatch) return;
                    
                    const optionsText = optionsMatch[1];
                    const options = [];
                    const optionRegex = /- [A-Z]\)\s*(.+?)(?=- [A-Z]\)|$)/gs;
                    let match;
                    
                    while ((match = optionRegex.exec(optionsText)) !== null) {
                        options.push(match[1].trim().replace(/\*\*\[CORRECT\]\*\*/g, ''));
                    }
                    
                    // Extract correct answer
                    const correctMatch = block.match(/\*\*Correct Answer:\*\*\s*([A-D])/);
                    const correctLetter = correctMatch ? correctMatch[1] : 'A';
                    const correctIdx = correctLetter.charCodeAt(0) - 65; // Convert A=0, B=1, C=2, D=3
                    
                    // Extract feedback
                    const feedbackMatch = block.match(/\*\*Feedback:\*\*\s*(.+?)(?=\*\*Theory Reference:\*\*|$)/s);
                    const feedback = feedbackMatch ? feedbackMatch[1].trim().replace(/\[...\]/g, '').slice(0, 300) : '';
                    
                    // Extract theory reference
                    const theoryMatch = block.match(/\*\*Theory Reference:\*\*\s*(.+?)(?:\n|$)/);
                    const theory = theoryMatch ? theoryMatch[1].trim() : '';
                    
                    // Only add if we have at least 3 options
                    if (options.length >= 3) {
                        questions.push({
                            id: questionBank.length + questions.length + 1,
                            title: title,
                            situation: situation,
                            options: options,
                            correct: correctIdx,
                            feedback: feedback,
                            theory: theory
                        });
                    }
                } catch (e) {
                    console.error('Error parsing question:', e);
                }
            });
            
            return questions;
        }

        // Extract content from theory files based on reference
        function extractTheoryContent(reference, theoryMarkdown, domainMarkdown) {
            if (!reference) return '';
            
            // Try to find the reference in the markdown
            let content = '';
            
            // Parse both domain notes and theory fundamentals
            const allContent = domainMarkdown + '\n\n---\n\n' + theoryMarkdown;
            
            // Extract the relevant section based on the reference
            // E.g., "Domain 1.4 - Programmatic enforcement vs prompt guidance"
            // or "Chapter 2.3 - tool_choice parameter and forced selection"
            
            const refPattern = reference.replace(/\s+/g, '\\s+').replace(/[\-\(\)]/g, '[\\-\\(\\)]?');
            const regex = new RegExp(`(#{1,4}\\s+${refPattern}.*?)(?=\n#{1,3}\\s|$)`, 'is');
            const match = allContent.match(regex);
            
            if (match) {
                content = match[1];
            }
            
            return content;
        }

        // Fetch and parse all question files
        async function loadQuestions() {
            try {
                // Load theory documents first
                let theoryMarkdown = '';
                let domainMarkdown = '';
                
                try {
                    const theoryResponse = await fetch('theory_fundamentals.md');
                    if (theoryResponse.ok) {
                        theoryMarkdown = await theoryResponse.text();
                    }
                } catch (e) {
                    console.warn('Could not load theory_fundamentals.md:', e);
                }
                
                try {
                    const domainResponse = await fetch('domain_notes.md');
                    if (domainResponse.ok) {
                        domainMarkdown = await domainResponse.text();
                    }
                } catch (e) {
                    console.warn('Could not load domain_notes.md:', e);
                }
                
                // Store for later use
                window.theoryMarkdown = theoryMarkdown;
                window.domainMarkdown = domainMarkdown;
                
                // Files to fetch for questions
                const files = [
                    'questions.md'
                ];
                
                for (const file of files) {
                    try {
                        const response = await fetch(file);
                        if (response.ok) {
                            const markdown = await response.text();
                            const questions = parseMarkdownQuestions(markdown);
                            questionBank = questionBank.concat(questions);
                        }
                    } catch (e) {
                        console.warn(`Could not load ${file}:`, e);
                    }
                }
                
                console.log(`Loaded ${questionBank.length} questions from all files`);
                
                // Start the quiz with random questions
                selectRandomQuestions();
                renderQuiz();
            } catch (error) {
                console.error('Error loading questions:', error);
                document.getElementById('quizContainer').innerHTML = 
                    '<div class="loading">Error loading questions. Please refresh the page.</div>';
            }
        }

        // Select 10 random questions for the current quiz
        function selectRandomQuestions() {
            if (questionBank.length === 0) return;
            
            const quizSize = Math.min(10, questionBank.length);
            const shuffled = [...questionBank].sort(() => Math.random() - 0.5);
            currentQuizQuestions = shuffled.slice(0, quizSize);
            currentAnswers = {};
        }

        // Convert markdown content to HTML (simplified)
        function markdownToHtml(markdown) {
            if (!markdown) return '';
            
            let html = markdown
                // Headers
                .replace(/^### (.*?)$/gm, '<h4>$1</h4>')
                .replace(/^## (.*?)$/gm, '<h3>$1</h3>')
                .replace(/^# (.*?)$/gm, '<h2>$1</h2>')
                // Bold
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/__(.*?)__/g, '<strong>$1</strong>')
                // Italic
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/_(.*?)_/g, '<em>$1</em>')
                // Code
                .replace(/`(.*?)`/g, '<code>$1</code>')
                // Line breaks and paragraphs
                .replace(/\n\n/g, '</p><p>')
                .replace(/^/gm, '');
            
            // Handle lists
            html = html.replace(/^- (.*?)$/gm, '<li>$1</li>')
                      .replace(/(<li>.*?<\/li>)/s, '<ul>$1</ul>')
                      .replace(/^(\d+)\. (.*?)$/gm, '<li>$1. $2</li>')
                      .replace(/(<li>\d+\..*?<\/li>)/s, '<ol>$1</ol>');
            
            // Clean up
            html = html.replace(/<\/p><p>/g, '</p><p>')
                      .replace(/^<p><\/p>/gm, '')
                      .replace(/<p>(<h[1-4]>)/g, '<p>$1')
                      .replace(/(<\/h[1-4]>)<\/p>/g, '<h1>');
            
            return '<p>' + html + '</p>';
        }

        function renderQuiz() {
            const container = document.getElementById('quizContainer');
            
            if (currentQuizQuestions.length === 0) {
                container.innerHTML = '<div class="loading">No questions available. Please refresh.</div>';
                return;
            }
            
            let html = '';

            currentQuizQuestions.forEach((question, index) => {
                html += `
                    <div class="question-block">
                        <div class="question-number">Question ${index + 1} of ${currentQuizQuestions.length}</div>
                        <div class="question-text">${escapeHtml(question.title)}</div>
                        <div class="situation">
                            <strong>Situation:</strong> ${escapeHtml(question.situation)}
                        </div>
                        <div class="options">
                            ${question.options.map((opt, idx) => `
                                <div class="option">
                                    <input type="radio" id="q${question.id}_${idx}" name="q${question.id}" value="${idx}">
                                    <label for="q${question.id}_${idx}">${String.fromCharCode(65 + idx)}) ${escapeHtml(opt)}</label>
                                </div>
                            `).join('')}
                        </div>
                        <div class="button-group">
                            <button type="button" class="btn-submit" onclick="submitAnswer(${question.id})">Submit Answer</button>
                        </div>
                        <div class="feedback" id="feedback-${question.id}">
                            <div class="feedback-title"></div>
                            <div class="feedback-text"></div>
                            <div class="theory-reference">
                                <div class="theory-title"></div>
                                <div class="theory-content"></div>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `
                <div class="score-section" id="scoreSection">
                    <div class="score-title">Quiz Complete!</div>
                    <div class="score-value" id="scoreValue">0%</div>
                    <div class="score-message" id="scoreMessage">Review your answers above</div>
                    <button type="button" class="btn-reset" onclick="resetQuiz()" style="margin-top: 20px; width: 100%; max-width: 200px;">Retake Quiz</button>
                </div>
            `;

            container.innerHTML = html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function submitAnswer(questionId) {
            const question = currentQuizQuestions.find(q => q.id === questionId);
            const selected = document.querySelector(`input[name="q${questionId}"]:checked`);

            if (!selected) {
                alert('Please select an answer');
                return;
            }

            const selectedIdx = parseInt(selected.value);
            currentAnswers[questionId] = selectedIdx;

            const feedbackDiv = document.getElementById(`feedback-${questionId}`);
            const isCorrect = selectedIdx === question.correct;

            feedbackDiv.querySelector('.feedback-title').textContent = isCorrect ? '✓ Correct' : '✗ Incorrect';
            feedbackDiv.querySelector('.feedback-text').textContent = isCorrect 
                ? question.feedback 
                : `The correct answer is: ${String.fromCharCode(65 + question.correct)}. ${question.feedback}`;
            
            // Extract and display theory content
            const theoryContent = extractTheoryContent(
                question.theory,
                window.theoryMarkdown || '',
                window.domainMarkdown || ''
            );
            
            const theoryTitleEl = feedbackDiv.querySelector('.theory-reference .theory-title');
            const theoryContentEl = feedbackDiv.querySelector('.theory-reference .theory-content');
            
            theoryTitleEl.textContent = question.theory;
            
            if (theoryContent) {
                // Convert markdown to HTML
                theoryContentEl.innerHTML = markdownToHtml(theoryContent);
            } else {
                theoryContentEl.innerHTML = '<p><em>Theory content loading...</em></p>';
            }

            feedbackDiv.classList.add('show', isCorrect ? 'correct' : 'incorrect');

            // Disable all options for this question
            document.querySelectorAll(`input[name="q${questionId}"]`).forEach(radio => {
                radio.disabled = true;
            });

            // Disable the button
            event.target.disabled = true;
            event.target.style.opacity = '0.5';

            // Check if all questions answered
            if (Object.keys(currentAnswers).length === currentQuizQuestions.length) {
                setTimeout(showScore, 500);
            }
        }

        function showScore() {
            let correct = 0;
            Object.entries(currentAnswers).forEach(([qId, answer]) => {
                const question = currentQuizQuestions.find(q => q.id === parseInt(qId));
                if (answer === question.correct) {
                    correct++;
                }
            });

            const percentage = Math.round((correct / currentQuizQuestions.length) * 100);
            document.getElementById('scoreValue').textContent = `${percentage}%`;
            document.getElementById('scoreMessage').textContent = `You got ${correct} out of ${currentQuizQuestions.length} questions correct!`;
            document.getElementById('scoreSection').classList.add('show');
        }

        function resetQuiz() {
            selectRandomQuestions();
            renderQuiz();
            window.scrollTo(0, 0);
        }

        // Helper function to extract theory
        function extractTheoryContent(reference, theoryMarkdown, domainMarkdown) {
            if (!reference) return '';
            
            const allContent = domainMarkdown + '\n\n---\n\n' + theoryMarkdown;
            
            // Parse reference like "Domain 1.4 - Programmatic enforcement"
            const parts = reference.match(/^([^-]+)-\s*(.+)$/);
            if (!parts) return '';
            
            const [, sectionRef, description] = parts;
            
            // Build regex patterns to find the section
            const patterns = [
                new RegExp(`^#{1,4}\\s+${sectionRef.trim()}\\b.*?(?=^#{1,4}\\s|$)`, 'mis'),
                new RegExp(`^#{1,4}\\s+([^#]*?)${description.split(' ')[0]}.*?(?=^#{1,3}\\s|$)`, 'mis')
            ];
            
            for (const pattern of patterns) {
                const match = allContent.match(pattern);
                if (match) {
                    // Take first 1500 chars to keep it manageable
                    return match[0].slice(0, 1500);
                }
            }
            
            return '';
        }

        // Load questions on page load
        window.addEventListener('DOMContentLoaded', loadQuestions);
    </script>
</body>
</html>

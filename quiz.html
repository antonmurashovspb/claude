<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Exam Preparation Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .quiz-container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .question-block {
            margin-bottom: 40px;
            padding-bottom: 40px;
            border-bottom: 2px solid #e5e7eb;
        }
        
        .question-block:last-of-type {
            border-bottom: none;
        }
        
        .question-number {
            font-size: 0.9em;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        
        .question-text {
            font-size: 1.15em;
            color: #1f2937;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .situation {
            background: #f3f4f6;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-size: 0.95em;
            color: #374151;
            line-height: 1.6;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .option {
            position: relative;
        }
        
        .option input {
            display: none;
        }
        
        .option label {
            display: block;
            padding: 14px 16px;
            background: #f9fafb;
            border: 2px solid #d1d5db;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95em;
            color: #374151;
        }
        
        .option label:hover {
            background: #f0f0f0;
            border-color: #999;
        }
        
        .option input:checked + label {
            background: #dbeafe;
            border-color: #667eea;
            font-weight: 600;
            color: #1e40af;
        }
        
        .option input:disabled + label {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .feedback {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            display: none;
            font-size: 0.95em;
            line-height: 1.6;
        }
        
        .feedback.show {
            display: block;
        }
        
        .feedback.correct {
            background: #dcfce7;
            border-left: 4px solid #22c55e;
            color: #166534;
        }
        
        .feedback.incorrect {
            background: #fee2e2;
            border-left: 4px solid #ef4444;
            color: #991b1b;
        }
        
        .feedback-title {
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 1.05em;
        }
        
        .feedback-text {
            margin-bottom: 12px;
        }
        
        .theory-reference {
            background: #fef3c7;
            border-radius: 4px;
            padding: 10px;
            font-size: 0.85em;
            color: #78350f;
            margin-top: 12px;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: flex-end;
        }
        
        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        
        .btn-submit {
            background: #667eea;
            color: white;
            min-width: 120px;
        }
        
        .btn-submit:hover:not(:disabled) {
            background: #5568d3;
        }
        
        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-reset {
            background: #e5e7eb;
            color: #374151;
        }
        
        .btn-reset:hover {
            background: #d1d5db;
        }
        
        .score-section {
            background: #f0f9ff;
            border: 2px solid #0ea5e9;
            border-radius: 8px;
            padding: 20px;
            margin-top: 40px;
            text-align: center;
            display: none;
        }
        
        .score-section.show {
            display: block;
        }
        
        .score-title {
            font-size: 1.3em;
            color: #0c4a6e;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .score-value {
            font-size: 2.5em;
            color: #667eea;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .score-message {
            color: #0c4a6e;
            font-size: 1em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Claude Exam Preparation Quiz</h1>
            <p>Test your knowledge across all domains</p>
        </div>
        
        <div id="quizContainer" class="quiz-container"></div>
    </div>
    
    <script>
        const quizData = [
            {
                id: 1,
                title: "Programmatic Enforcement vs Prompt Guidance",
                situation: "You have a customer support agent with tools: `get_customer`, `lookup_order`, and `process_refund`. Currently, the system prompt instructs the agent to 'always verify customer identity before processing refunds.' However, production logs show 5% of refunds are processed without proper verification.",
                options: ["Add more detailed prompt instructions emphasizing the importance of verification", "Implement a programmatic precondition that blocks `process_refund` until `get_customer` returns a verified customer ID", "Add few-shot examples showing correct verification patterns", "Reduce the agent's toolset to remove `process_refund` capability"],
                correct: 1,
                feedback: "CORRECT! When business rules require guaranteed compliance (like financial operations), prompts provide only probabilistic compliance (>90%). Programmatic preconditions provide deterministic guarantees (100%). A hook-based approach ensures the rule cannot be bypassed.",
                theory: "Domain 1.4 & 1.5 - Programmatic enforcement vs prompt guidance"
            },
            {
                id: 2,
                title: "CLAUDE.md Hierarchy and Project Configuration",
                situation: "Your team just hired a new developer. They cloned the repository and started using Claude Code. The original team members follow specific testing conventions and API patterns. The new developer does not see these instructions and writes code that violates project standards. Investigation shows the standards were placed in `~/.claude/CLAUDE.md` on the original developers' machines.",
                options: ["Have the new developer manually copy the instructions to their `~/.claude/CLAUDE.md`", "Move the standards to `.claude/CLAUDE.md` in the repository so all team members automatically receive them", "Add the standards to the root `CLAUDE.md` and instruct the new developer to merge them with their user config", "Create directory-level CLAUDE.md files in each subdirectory containing relevant standards"],
                correct: 1,
                feedback: "CORRECT! Project-level CLAUDE.md (`.claude/CLAUDE.md` or root) is automatically available to all team members when they clone the repository via version control. User-level configs are not shared and only apply to individual developers.",
                theory: "Domain 3.1 - CLAUDE.md hierarchy: user, project, and directory levels"
            },
            {
                id: 3,
                title: "Tool Allocation and Specialization",
                situation: "You have a document analysis subagent that specializes in parsing PDFs and extracting structured data. You notice it frequently misuses `fetch_url` to fetch arbitrary web pages instead of focusing on document analysis. The tool was intended to download referenced documents by URL.",
                options: ["Remove `fetch_url` entirely and have the coordinator handle all URL fetching", "Replace the general-purpose `fetch_url` with a specialized `load_document` tool that validates URLs point to document formats (PDF, DOCX, etc.)", "Add detailed instructions to the agent prompt restricting `fetch_url` usage to document URLs only", "Implement a filter that blocks `fetch_url` calls to known search engine domains"],
                correct: 1,
                feedback: "CORRECT! Replacing a general-purpose tool with a specialized one fixes the root cause by constraining capability at the interface level. A `load_document` tool that validates URLs prevents misuse for arbitrary web fetching.",
                theory: "Domain 2.3 - Tool allocation and specialized alternatives"
            },
            {
                id: 4,
                title: "Prompt Chaining vs Dynamic Decomposition",
                situation: "Your system performs automated code reviews on pull requests. You have two approaches to consider: (1) a fixed sequence—analyze each file for local issues, then run a separate integration pass for cross-file concerns, or (2) generate subtasks dynamically based on what the system discovers (e.g., if circular dependencies are found, prioritize analyzing them).",
                options: ["Always use dynamic decomposition because it adapts to the actual code structure", "Use prompt chaining (fixed pipeline) because code reviews follow a predictable structure; each file is analyzed separately, then integration pass catches cross-file issues", "Use dynamic decomposition only for large PRs (20+ files); use prompt chaining for smaller PRs", "Use prompt chaining but allow the model to skip steps if it considers them unnecessary"],
                correct: 1,
                feedback: "CORRECT! Prompt chaining is ideal for predictable, repeatable tasks like code reviews where the structure is always known up front (per-file analysis → integration pass). Dynamic decomposition is better for open-ended investigations.",
                theory: "Domain 1.6 & Chapter 8.1-8.2 - Task decomposition strategies"
            },
            {
                id: 5,
                title: "Few-shot Prompting for Ambiguous Scenarios",
                situation: "Your customer support agent frequently mishandles ambiguous customer requests. When a customer says 'I want to speak to a manager,' the agent sometimes attempts to resolve the issue first. When a customer says 'My item is broken,' the agent sometimes escalates immediately instead of investigating the order details first.",
                options: ["Improve the system prompt with more explicit rules for escalation", "Add 3-4 few-shot examples that demonstrate the distinction: 'I want to speak to a manager' → escalate immediately; 'My item is broken' → investigate order first, then escalate if needed", "Split the agent into two separate agents—one for escalations and one for investigations", "Use sentiment analysis to determine when to escalate vs investigate"],
                correct: 1,
                feedback: "CORRECT! Few-shot examples targeting ambiguous scenarios with explicit rationale (why escalate here vs investigate there) directly teaches the model the distinction. This is more effective than vague rules.",
                theory: "Domain 4.2 - Few-shot prompting for ambiguous cases"
            },
            {
                id: 6,
                title: "Lost-in-the-middle Effect and Context Organization",
                situation: "You are synthesizing research from multiple sources into a final report. The coordinator has collected results from three subagents: web search (returned 80K tokens), document analysis (returned 70K tokens), and fact verification (returned 20K tokens). The synthesis agent reliably cites information from the first and last sections but frequently misses findings from the middle sections.",
                options: ["Summarize all sections to under 50K tokens to keep content within reliable processing range", "Place a key-findings summary at the beginning and organize the rest with explicit section headings to counteract the lost-in-the-middle effect", "Run the synthesis in three separate passes—one for each subagent's results", "Store the full results in a vector database and have the synthesis agent query it on demand"],
                correct: 1,
                feedback: "CORRECT! The lost-in-the-middle effect causes models to miss content in the middle of long inputs. Placing a key-findings summary at the beginning (primacy effect) and using explicit headings mitigates this.",
                theory: "Domain 5.1 & Chapter 1.5 - Lost-in-the-middle effect and context positioning"
            },
            {
                id: 7,
                title: "Skills and Context Isolation",
                situation: "Your team created a `/dependency-map` skill that analyzes the full codebase structure, generates dependency graphs, identifies circular dependencies, and outputs a 150K-token report with visualizations and detailed explanations. After running the skill, developers report they lose track of their original task because the verbose output fills the context window.",
                options: ["Tell developers to manually summarize the output before continuing", "Add `context: fork` in the skill's SKILL.md frontmatter to run it in an isolated subagent context", "Split the skill into multiple smaller skills, each producing less output", "Instruct the skill to compress all output into a one-paragraph summary"],
                correct: 1,
                feedback: "CORRECT! `context: fork` runs the skill in an isolated subagent context so its verbose output does not pollute the main session history. The developer retains focus on their original task.",
                theory: "Domain 3.2 - Skills with context: fork for isolated execution"
            },
            {
                id: 8,
                title: "Structured Error Context and Recovery Decisions",
                situation: "A document analysis subagent encounters a corrupted PDF file and returns: `{\"isError\": true, \"content\": \"File parsing failed\"}`. The coordinator receives this response but does not know whether to retry with a different approach, skip the file and continue, or request the user provide the file in a different format.",
                options: ["Assume all file parsing errors are transient; implement automatic retry with exponential backoff", "Return structured error context: failure type (corruption), what was attempted (PDF parsing), whether it is retryable, and alternatives (convert to another format, manually review)", "Have the subagent silently skip the corrupted file and return an empty result marked as success", "Immediately escalate to a human when any file parsing error occurs"],
                correct: 1,
                feedback: "CORRECT! Structured error context (failure type, attempted action, retryability, alternatives) enables the coordinator to make intelligent recovery decisions. Generic errors provide no actionable information.",
                theory: "Domain 5.3 & Chapter 10.2 - Error propagation strategies"
            },
            {
                id: 9,
                title: "PostToolUse Hooks and Data Normalization",
                situation: "Your agent uses three different MCP tools that return dates in different formats: Unix timestamps (1704067200), ISO 8601 dates (2024-01-01), and human-readable strings (January 1, 2024). The agent produces inconsistent output because it treats these formats differently and sometimes fails to compare or order dates correctly.",
                options: ["Add detailed instructions to the system prompt explaining date format differences and how to normalize them", "Implement a `PostToolUse` hook that intercepts tool results and normalizes all dates to ISO 8601 format before the agent processes them", "Create wrapper tools for each MCP server that normalize outputs before returning them", "Have the agent call a separate `normalize_dates` tool after each data retrieval"],
                correct: 1,
                feedback: "CORRECT! A `PostToolUse` hook intercepts tool results before the agent processes them, applying normalization transformations (Unix timestamp → ISO 8601) at a centralized point.",
                theory: "Domain 1.5 - PostToolUse hooks for data normalization"
            },
            {
                id: 10,
                title: "tool_choice Parameter and Forced Selection",
                situation: "You have a data extraction system with multiple extraction tools: `extract_invoice`, `extract_receipt`, and `extract_statement`. You want to ensure that the model first calls `extract_metadata` to determine the document type before calling any of the specialized extraction tools.",
                options: ["Use `tool_choice: \"auto\"` and add instructions to always extract metadata first", "Use `tool_choice: \"any\"` to force the model to call some tool, then let it choose", "Use forced tool selection: `tool_choice: {\"type\": \"tool\", \"name\": \"extract_metadata\"}` to guarantee `extract_metadata` is called first", "Remove the specialized extraction tools and use only `extract_metadata` with a type parameter"],
                correct: 2,
                feedback: "CORRECT! Forced tool selection (`tool_choice: {\"type\": \"tool\", \"name\": \"extract_metadata\"}`) makes it architecturally impossible to skip the first step. The model must call it before proceeding.",
                theory: "Chapter 2.3 - tool_choice parameter and forced selection"
            }
        ];

        let currentAnswers = {};

        function renderQuiz() {
            const container = document.getElementById('quizContainer');
            let html = '';

            quizData.forEach(question => {
                html += `
                    <div class="question-block">
                        <div class="question-number">Question ${question.id} of ${quizData.length}</div>
                        <div class="question-text">${question.title}</div>
                        <div class="situation">
                            <strong>Situation:</strong> ${question.situation}
                        </div>
                        <div class="options">
                            ${question.options.map((opt, idx) => `
                                <div class="option">
                                    <input type="radio" id="q${question.id}_${idx}" name="q${question.id}" value="${idx}">
                                    <label for="q${question.id}_${idx}">${String.fromCharCode(65 + idx)}) ${opt}</label>
                                </div>
                            `).join('')}
                        </div>
                        <div class="button-group">
                            <button type="button" class="btn-submit" onclick="submitAnswer(${question.id})">Submit Answer</button>
                        </div>
                        <div class="feedback" id="feedback-${question.id}">
                            <div class="feedback-title"></div>
                            <div class="feedback-text"></div>
                            <div class="theory-reference"></div>
                        </div>
                    </div>
                `;
            });

            html += `
                <div class="score-section" id="scoreSection">
                    <div class="score-title">Quiz Complete!</div>
                    <div class="score-value" id="scoreValue">0%</div>
                    <div class="score-message" id="scoreMessage">Review your answers above</div>
                    <button type="button" class="btn-reset" onclick="resetQuiz()" style="margin-top: 20px; width: 100%; max-width: 200px;">Retake Quiz</button>
                </div>
            `;

            container.innerHTML = html;
        }

        function submitAnswer(questionId) {
            const question = quizData.find(q => q.id === questionId);
            const selected = document.querySelector(`input[name="q${questionId}"]:checked`);

            if (!selected) {
                alert('Please select an answer');
                return;
            }

            const selectedIdx = parseInt(selected.value);
            currentAnswers[questionId] = selectedIdx;

            const feedbackDiv = document.getElementById(`feedback-${questionId}`);
            const isCorrect = selectedIdx === question.correct;

            feedbackDiv.querySelector('.feedback-title').textContent = isCorrect ? '✓ Correct' : '✗ Incorrect';
            feedbackDiv.querySelector('.feedback-text').textContent = isCorrect 
                ? question.feedback 
                : `The correct answer is: ${String.fromCharCode(65 + question.correct)}. ${question.feedback}`;
            feedbackDiv.querySelector('.theory-reference').textContent = question.theory;

            feedbackDiv.classList.add('show', isCorrect ? 'correct' : 'incorrect');

            // Disable all options for this question
            document.querySelectorAll(`input[name="q${questionId}"]`).forEach(radio => {
                radio.disabled = true;
            });

            // Disable the button
            event.target.disabled = true;
            event.target.style.opacity = '0.5';

            // Check if all questions answered
            if (Object.keys(currentAnswers).length === quizData.length) {
                setTimeout(showScore, 500);
            }
        }

        function showScore() {
            let correct = 0;
            Object.entries(currentAnswers).forEach(([qId, answer]) => {
                const question = quizData.find(q => q.id === parseInt(qId));
                if (answer === question.correct) {
                    correct++;
                }
            });

            const percentage = Math.round((correct / quizData.length) * 100);
            document.getElementById('scoreValue').textContent = `${percentage}%`;
            document.getElementById('scoreMessage').textContent = `You got ${correct} out of ${quizData.length} questions correct!`;
            document.getElementById('scoreSection').classList.add('show');
        }

        function resetQuiz() {
            currentAnswers = {};
            document.querySelectorAll('input[type="radio"]').forEach(radio => {
                radio.disabled = false;
                radio.checked = false;
            });
            document.querySelectorAll('.feedback').forEach(fb => {
                fb.classList.remove('show', 'correct', 'incorrect');
            });
            document.querySelectorAll('button.btn-submit').forEach(btn => {
                btn.disabled = false;
                btn.style.opacity = '1';
            });
            document.getElementById('scoreSection').classList.remove('show');
            window.scrollTo(0, 0);
        }

        // Initialize on load
        renderQuiz();
    </script>
</body>
</html>
